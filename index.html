<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind+daisyUI CDN  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet design  -->
    <link rel="stylesheet" href="style.css">


</head>

<body>
    <!-- navbar section  -->
    <section class="navbar px-8 mx-auto text-white bg-[#15803D] shadow-sm">

        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
            </div>
            <a class="btn btn-ghost text-xl">Green Earth</a>
        </div>

        <div class="navbar-center lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><a>About</a></li>
                <li><a>Gallery</a></li>
                <li><a>Plant a Tree</a></li>
            </ul>
        </div>

        <div class="navbar-end">
            <a class="btn btn-warning rounded-full text-[#15803D]">Plant a Tree</a>
        </div>
    </section>

    <!-- hero section  -->
     <section class="bg-[#DCFCE7] mx-auto px-7">
        <div class="flex justify-between items-center">
            <div>
                <img src="./assets/hero-leaf1.png" alt="">
            </div>

            <div class="text-center space-y-4">
                <h2 class="font-bold text-3xl">Plant a Tree, Grow a Future</h2>
                <p class="font-regular text-[17px] text-[#1F2937]">Join our mission to plant 1 million trees and make the Earth greener for future generations.</p>
                <button class="btn btn-warning rounded-full text-[#15803D]">Green Earth</button>
            </div>

            <div>
                <img src="./assets/hero-leaf2.png" alt="">
            </div>
        </div>

     </section>

</body>

</html>
